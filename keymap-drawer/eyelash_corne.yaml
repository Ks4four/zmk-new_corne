- p: [16, 32]
  k: {t: '$$mdi:backspace$$', type: backspace}
- p: [16, 30]
  k: $$mdi:backspace-reverse-outline$$
- p: [17, 16]
  k: $$mdi:keyboard-space$$
- p: [16, 15]
  k: $$mdi:keyboard-tab$$
- p: [23, 24]
  k: ':'
- p: [25, 24]
  k: {t: ;, s: ':'}
- p: [37, 24]
  k: +
- p: [24, 39]
