- p: [2, 4]
  k: '~'
- p: [23, 25]
  k: {t: \, s: '|'}
- p: [8, 10]
  k: '|'
- p: [32, 31]
  k: {t: '1', h: F1}
- p: [30, 31]
  k: {t: '2', h: F2}
- p: [4, 3]
  k: {t: '3', h: F3}
- p: [3, 2]
  k: {t: '4', h: F4, s: $}
- p: [17, 31]
  k: {t: '5', h: F5, s: '%'}
- p: [17, 16, 15]
  k: {t: '$$mdi:keyboard-return$$', type: enter}
- p: [1, 29]
  k: $$mdi:progress-download$$
